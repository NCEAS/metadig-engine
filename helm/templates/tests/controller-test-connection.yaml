apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "metadig.fullname" . }}-controller-test-connection"
  labels:
    {{- include "metadig.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      # 1. Added '.controller' to the values path
      # 2. Used the full service name helper
      args: ['{{ include "metadig.fullname" . }}-controller:{{ .Values.controller.service.port }}']
  restartPolicy: Never