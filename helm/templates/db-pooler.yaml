apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: {{ .Values.db.clusterName | default "metadig-pg" }}-pooler
spec:
  cluster:
    name: {{ .Values.db.clusterName | default "metadig-pg" }}

  instances: 3
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "200"
      default_pool_size: "30"